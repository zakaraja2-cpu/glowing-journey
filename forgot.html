<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mot de passe oublié</title>
<link rel="stylesheet" href="forgot.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>

<body>

<div class="container">

    <!-- LEFT -->
    <div class="left">
        <div class="overlay">
            <h1>RÉCUPÉRATION</h1>
            <p>Réinitialisez votre mot de passe facilement</p>

            <div class="features">
                <p><i class="fas fa-shield-alt"></i> Sécurité garantie</p>
                <p><i class="fas fa-clock"></i> Rapide et simple</p>
                <p><i class="fas fa-user-lock"></i> Protection des comptes</p>
            </div>
        </div>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <div class="form-box">

            <h2>Mot de passe oublié</h2>
            <p>Entrez votre email pour recevoir un lien</p>

            <form>

                <div class="input-box">
                    <i class="fas fa-envelope"></i>
                    <input type="email" placeholder="Votre email" required>
                </div>

                <button type="submit">Envoyer</button>

                <p class="back">
                    <a href="connexion.html">← Retour à la connexion</a>
                </p>

            </form>

        </div>
    </div>

</div>

</body>
</html>
