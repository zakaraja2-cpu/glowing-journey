<section class="container">
 <div class="logo">

<div class="auth-container">

                <p><i class="fas fa-lock"></i> Paiement sécurisé</p>
            </div>

  <!-- RIGHT SIDE -->
  <div class="right">
    <div class="form-box">
      <h2>Inscription</h2>

<form class="form" onsubmit="register(event)">
   

 <div class="input-group">
  <i class="fa fa-user"></i>
  <input type="text" placeholder="Nom complet" required id="name" value="FEKKAK HAJAR">
 </div>

 <div class="input-group">
  <i class="fa fa-envelope"></i>
  <input type="email" placeholder="Email" required id="email" value="BuildZone@gmail.com">
 </div>

 <div class="input-group">

 </div>

 <div class="input-group">
  <i class="fa fa-lock"></i>
  <input type="password" placeholder="Mot de passe" required id="password" value="naima12yahya">
  <i class="fa fa-eye toggle"></i>
</div>

<div class="input-group">
  <i class="fa fa-lock"></i>
  <input type="password" placeholder="Confirmer mot de passe" required id="password" value="naima12yahya">
  <i class="fa fa-eye toggle"></i>
</div>
     
      <input type="checkbox">J'accepte les conditions <br>
       
        <button type="submit">Créer mon compte</button>

      <p class="login-link">
        Déjà un compte ? <a href="connexion.html">Se connecter</a>
      </p></div></div>  </div>
    
 </form>





    
  


</section>

   
</body>
<script>
function register(e) {
  e.preventDefault();

  let user = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    password: document.getElementById("password").value
  };

  localStorage.setItem("user", JSON.stringify(user));

  alert("Inscription réussie !");
  window.location.href = "connexion.html";
}
</script>
<script>
document.querySelectorAll(".toggle").forEach(icon => {
  icon.addEventListener("click", () => {
    let input = icon.previousElementSibling;
    if(input.type === "password"){
      input.type = "text";
      icon.classList.replace("fa-eye", "fa-eye-slash");
    } else {
      input.type = "password";
      icon.classList.replace("fa-eye-slash", "fa-eye");
    }
  });
});
</script>
