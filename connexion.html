
 <!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Connexion - BuildZone</title>
<link rel="stylesheet" href="connexion.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>

<body>

<div class="container">

    <!-- LEFT SIDE -->
    <div class="left">
        <div class="overlay">
            <h1>CONNECTEZ-VOUS</h1>
            <p>Accédez à votre compte BuildZone</p>

            <div class="features">
                <p><i class="fas fa-check-circle"></i> Produits certifiés</p>
                <p><i class="fas fa-truck"></i> Livraison rapide</p>
                <p><i class="fas fa-lock"></i> Paiement sécurisé</p>
            </div>
        </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right">
        <div class="form-box">

            <h2>Connexion</h2>
            <p>Entrez vos informations</p>

            <form>

                <div class="input-box">
                    <i class="fas fa-envelope"></i>
                    <input type="email" placeholder="Email" required value="BuildZone@gmail.com">
                </div>

                <div class="input-box">
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="Mot de passe" required value="naima12yahya"> 
                </div>

                <div class="options">
                    <label>
                        <input type="checkbox"> Se souvenir de moi
                    </label>
                    <a href="forgot.html">Mot de passe oublié ?</a>
                </div>

                <button type="submit">Se connecter</button>

                <p class="register">
                    Pas de compte ? <a href="inscription.html">S'inscrire</a>
                </p>

            </form>

        </div>
    </div>

</div>



<script>
function login(e) {
  e.preventDefault();

  let email = document.getElementById("loginEmail").value;
  let password = document.getElementById("loginPassword").value;

  let user = JSON.parse(localStorage.getItem("user"));

  if(user && user.email === email && user.password === password) {
    alert("Connexion réussie !");
    window.location.href = "index.html";
  } else {
    alert("Email ou mot de passe incorrect");
  }
}
</script> 

  
</body>
</html>
